name: PR checks

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: CGO_ENABLED=0 go build ./...

      - name: Test
        # -timeout 120s gives each Wiremock container time to start
        run: go test -timeout 120s ./...
