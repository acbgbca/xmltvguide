version: "2"

formatters:
  enable:
    - gofmt      # standard Go formatting
    - goimports  # import grouping (stdlib / external / internal)
    - gci        # enforces import order: stdlib, external, project-local

  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/acbgbca/xmltvguide)

linters:
  default: none
  enable:
    # Correctness
    - govet        # go vet: reports suspicious constructs
    - errcheck     # checks that errors are handled
    - staticcheck  # advanced static analysis
    - unused       # checks for unused constants, variables, functions and types

    # Best practices
    - gocritic     # opinionated checks: performance, style, diagnostics
    - bodyclose    # checks that http response bodies are closed
    - noctx        # detects http requests without context
    - misspell     # catches common spelling mistakes in comments/strings
    - unparam      # reports unused function parameters

    # Complexity / smells
    - cyclop       # cyclomatic complexity per function
    - dupl         # code duplication detection
    - gocognit     # cognitive complexity

    # Security
    - gosec        # security checks (G### rules)

  settings:
    cyclop:
      max-complexity: 15

    gocognit:
      min-complexity: 20

    dupl:
      threshold: 120

    gosec:
      excludes:
        - G404   # use of weak random — acceptable for non-cryptographic use

  exclusions:
    rules:
      # Allow cyclomatic complexity up to 20 in test files (threshold is 15 for
      # production code). Tests with complexity 16–20 are acceptable due to
      # table-driven checks and assertion sequences.
      - path: "_test\\.go"
        linters:
          - cyclop
        text: "calculated cyclomatic complexity.*is (1[6-9]|20),"

      # Suppress errcheck for idiomatic test teardown and test HTTP handler patterns:
      # - defer resp.Body.Close() — unrecoverable after headers sent; irrelevant in tests
      # - defer db.Close() / rawDB.Close() — temp-dir-scoped test database teardown
      # - fmt.Fprint / fmt.Fprintf / w.Write to http.ResponseWriter in test handlers
      - path: "_test\\.go"
        linters:
          - errcheck
        text: "Error return value of `(.*\\.Close|fmt\\.Fprint|fmt\\.Fprintf|.*\\.Write)` is not checked"

      # Suppress G104 (gosec "errors unhandled") in test files for the same
      # idiomatic patterns already excluded for errcheck:
      # - .Close() in test teardown
      # - w.Write() in fake test HTTP handlers
      # - io.Copy() / resp.Body.Close() when reading test responses
      # G104 messages do not include the function name, so a path filter is
      # the correct scope here.
      - path: "_test\\.go"
        linters:
          - gosec
        text: "G104"

      # Suppress G306 (gosec "file permissions too permissive") in test files.
      # Test fixtures written with os.WriteFile(..., 0644) have no security
      # implications — the files are temporary and scoped to t.TempDir().
      - path: "_test\\.go"
        linters:
          - gosec
        text: "G306"

      # Allow high cognitive complexity in test functions. Tests legitimately
      # accumulate complexity through subtests, assertion sequences, and
      # error-check branches — the metric does not meaningfully apply here.
      - path: "_test\\.go"
        linters:
          - gocognit

      # Suppress gosec findings on w.Write() calls to http.ResponseWriter in
      # production API handlers. G104 (errors unhandled) and G705 (XSS taint)
      # are both false positives: the data is either a constant or loaded from
      # the local database, and errors after headers are sent cannot be recovered.
      - path: "internal/api/"
        source: "w\\.Write"
        linters:
          - gosec

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
