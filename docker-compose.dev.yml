services:
  tvguide:
    environment:
      XMLTV_URL: "http://wiremock:8080/guide.xml"
      TZ: "Australia/Melbourne"
      POLL_INTERVAL: "1h"
      REFRESH_ON_START: "true"
    volumes:
      - tvguide_dev_data:/data
    depends_on:
      wiremock:
        condition: service_healthy

  wiremock:
    build: ./wiremock
    ports:
      - "8888:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/__admin/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

volumes:
  tvguide_dev_data:
