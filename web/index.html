<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#161b22">
    <title>TV Guide</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="stylesheet" href="/style/base.css">
    <link rel="stylesheet" href="/style/layout.css">
    <link rel="stylesheet" href="/style/guide.css">
    <link rel="stylesheet" href="/style/modal.css">
    <link rel="stylesheet" href="/style/search.css">
    <link rel="stylesheet" href="/style/favourites.css">
    <link rel="stylesheet" href="/style/settings.css">
    <link rel="stylesheet" href="/style/explore.css">
</head>
<body>

    <header class="top-bar" id="topBar">
        <span class="app-title">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-label="TV Guide">
                <rect x="2" y="7" width="20" height="15" rx="2" ry="2"/>
                <polyline points="17 2 12 7 7 2"/>
            </svg>
        </span>
        <div class="top-bar-center">
            <button class="nav-btn" id="prevDay" title="Previous day">&#8249;</button>
            <span id="dateDisplay"></span>
            <button class="nav-btn" id="nextDay" title="Next day">&#8250;</button>
        </div>
        <div class="top-bar-actions">
            <button class="action-btn" id="nowBtn">Now</button>
        </div>
    </header>

    <!-- Page: Guide -->
    <div class="page" id="page-guide">
        <div class="guide-container">

            <div class="guide-corner"></div>

            <!-- Time axis: overflow hidden, scrollLeft synced with programmes -->
            <div class="time-axis-outer" id="timeAxisOuter">
                <div class="time-axis" id="timeAxis"></div>
            </div>

            <!-- Channel column: overflow hidden, scrollTop synced with programmes -->
            <div class="channel-col-outer" id="channelColOuter">
                <div class="channel-col" id="channelCol"></div>
            </div>

            <!-- Main scroll container — drives scroll sync for the other two -->
            <div class="programmes-outer" id="programmesOuter">
                <div class="programmes-inner" id="programmesInner">
                    <div class="now-line" id="nowLine"></div>
                </div>
            </div>

            <!-- Loading overlay — shown during day-to-day navigation -->
            <div class="guide-loading-overlay" id="guideLoadingOverlay">
                <div class="loading-spinner"></div>
            </div>

            <!-- No-data message — shown when the selected day has no guide data -->
            <div class="guide-empty" id="guideEmpty">There is no guide data for this day</div>

        </div>
    </div>

    <!-- Page: Search -->
    <div class="page" id="page-search" style="display:none">
        <div class="page-content search-page">
            <div class="search-input-wrap">
                <input type="text" id="searchInput" placeholder="Search programmes..." autocomplete="off" autocorrect="off" spellcheck="false">
                <button class="search-clear-btn" id="searchClear" title="Clear search">&#10005;</button>
                <div class="search-spinner" id="searchSpinner"></div>
            </div>

            <button class="advanced-toggle" id="advancedToggle">Advanced options</button>
            <div class="advanced-options" id="advancedOptions" style="display:none">
                <label class="search-checkbox"><input type="checkbox" id="searchDescriptions"> Search descriptions</label>
                <label class="search-checkbox"><input type="checkbox" id="includePast"> Include past airings</label>
                <label class="search-checkbox"><input type="checkbox" id="hideRepeats"> Hide repeats</label>
                <div class="category-chips-wrap">
                    <div class="category-chips-label">Categories</div>
                    <div class="category-chips" id="categoryChips"></div>
                </div>
            </div>

            <div class="search-hint" id="searchHint">Enter at least 2 characters to search</div>
            <div class="search-results" id="searchResults"></div>
        </div>
    </div>

    <!-- Page: Favourites -->
    <div class="page" id="page-favourites" style="display:none">
        <div class="page-content favourites-page">
            <h1>Favourites</h1>
            <div class="favourites-loading" id="favouritesLoading">
                <div class="loading-spinner"></div>
            </div>
            <div class="favourites-empty" id="favouritesEmpty" style="display:none">
                No favourite searches saved. Use the Search tab to find shows and save them.
            </div>
            <div class="favourites-list" id="favouritesList"></div>
        </div>
    </div>

    <!-- Page: Explore -->
    <div id="page-explore" style="display:none">
        <!-- mode switcher and mode content rendered by JS -->
    </div>

    <!-- Page: Settings -->
    <div class="page" id="page-settings" style="display:none">
        <div class="page-content">
            <h1>Channels</h1>
            <div class="settings-list" id="settingsList"></div>
        </div>
    </div>

    <!-- Bottom navigation bar -->
    <nav class="bottom-nav" id="bottomNav">
        <button class="bottom-nav-btn active" data-page="guide" aria-label="Guide">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
            </svg>
            <span>Guide</span>
        </button>
        <button class="bottom-nav-btn" data-page="search" aria-label="Search">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <span>Search</span>
        </button>
        <button class="bottom-nav-btn" data-page="favourites" aria-label="Favourites">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
            </svg>
            <span>Favourites</span>
        </button>
        <button class="bottom-nav-btn" data-page="explore" aria-label="Explore">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/>
            </svg>
            <span>Explore</span>
        </button>
        <button class="bottom-nav-btn" data-page="settings" aria-label="Settings">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
            <span>Settings</span>
        </button>
    </nav>

    <!-- Programme details modal -->
    <div class="modal-backdrop" id="modalBackdrop">
        <div class="modal" id="programmeModal">
            <button class="close-btn modal-close-btn" id="modalClose">&#10005;</button>
            <div class="modal-meta">
                <span class="modal-category" id="modalCategory"></span>
                <span class="modal-rating" id="modalRating"></span>
                <span class="modal-year" id="modalYear"></span>
            </div>
            <h2 class="modal-title" id="modalTitle"></h2>
            <div class="modal-time" id="modalTime"></div>
            <div class="modal-episode" id="modalEpisode"></div>
            <div class="modal-subtitle" id="modalSubtitle"></div>
            <div class="modal-badges" id="modalBadges"></div>
            <p class="modal-desc" id="modalDesc"></p>
        </div>
    </div>

    <!-- Full-screen loading overlay -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <p id="loadingText">Loading TV guide...</p>
        </div>
    </div>

    <script type="module" src="/js/main.js"></script>

</body>
</html>
